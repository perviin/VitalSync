# Configuration Nginx pour VitalSync Frontend
# Servage statique d'index.html et proxy API vers le backend

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    # Optimisation des connexions simultanées
    worker_connections 1024;
    use epoll;  # Utilise epoll sur Linux pour meilleure performance
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Format de log personnalisé avec détails des requêtes
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Optimisations de performance
    sendfile on;              # Utilisé pour servir les fichiers statiques efficacement
    tcp_nopush on;            # Envoie en une seule fois (avec sendfile)
    tcp_nodelay on;           # Désactive Nagle pour temps de réponse rapide
    keepalive_timeout 65;     # Timeout pour les connexions persistantes
    types_hash_max_size 2048;
    client_max_body_size 10M; # Max upload size

    # Headers de sécurité
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gestion du cache pour les assets statiques
    map $sent_http_content_type $expires {
        default off;
        text/html epoch;              # Ne pas cacher les pages HTML
        text/css max;                 # Cache navigateur maximal pour CSS
        application/javascript max;   # Cache maximal pour JS
        ~image/ max;                  # Cache maximal pour images
        ~font/ max;                   # Cache maximal pour polices
    }
    expires $expires;

    # Serveur web frontend - Servage statique avec proxy API
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Racine des fichiers statiques
        root /usr/share/nginx/html;

        # Servage des assets statiques avec cache
        location / {
            # Essaye index.html pour les routes SPA (Single Page App)
            try_files $uri $uri/ /index.html;
            # Caching des assets
            expires 1d;
            add_header Cache-Control "public, immutable";
        }

        # Proxy vers le backend pour les requêtes API
        # Toutes les requêtes /api/* sont proxifiées vers le backend
        location /api/ {
            # URL du backend (service 'backend' dans docker-compose)
            proxy_pass http://backend:3000;

            # Headers pour informer le backend de l'adresse originale
            proxy_set_header Host $host;                        # Host original
            proxy_set_header X-Real-IP $remote_addr;            # IP réelle du client
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # Chaîne d'IPs
            proxy_set_header X-Forwarded-Proto $scheme;         # Protocole original (http/https)

            # Timeouts pour les connexions longues
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Pas de cache pour les appels API
            proxy_no_cache 1;
            proxy_cache_bypass 1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # Route de health check pour orchestration Docker
        location /health {
            access_log off;  # Ne pas logger les health checks
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Fichiers non trouvés - Retour à la page d'accueil (SPA)
        error_page 404 /index.html;

        # Sécurité - Bloquer l'accès aux fichiers cachés et sensibles
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
