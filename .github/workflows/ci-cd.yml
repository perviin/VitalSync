name: CI/CD Pipeline - VitalSync

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Étape 1: Lint & Tests
  lint-and-test:
    name: Lint & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: cd backend && npm ci

      - name: Run ESLint
        run: cd backend && npm run lint
        continue-on-error: true

      - name: Run Jest tests
        run: cd backend && npm test -- --coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./backend/coverage/coverage-final.json
          fail_ci_if_error: false

  # Étape 2: Build Docker
  build-docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/pervi/vitalsync-api
          tags: |
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/pervi/vitalsync-web
          tags: |
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Étape 3: Déploiement Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Stop previous containers
        run: docker-compose down || true

      - name: Create .env file for staging
        run: |
          cat > .env << EOF
          DB_USER=vitalsync_user
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=vitalsync_db
          NODE_ENV=staging
          PORT=3000
          API_URL=http://localhost:3000
          FRONTEND_URL=http://localhost
          EOF

      - name: Pull latest images
        run: |
          docker pull ${{ env.REGISTRY }}/pervi/vitalsync-api:develop-${{ github.sha }}
          docker pull ${{ env.REGISTRY }}/pervi/vitalsync-web:develop-${{ github.sha }}
        continue-on-error: true

      - name: Deploy with docker-compose
        run: |
          docker tag ${{ env.REGISTRY }}/pervi/vitalsync-api:develop-${{ github.sha }} vitalsync-api:latest || true
          docker tag ${{ env.REGISTRY }}/pervi/vitalsync-web:develop-${{ github.sha }} vitalsync-web:latest || true
          docker-compose up -d

      - name: Wait for services to start
        run: sleep 10

      - name: Health check - Database
        run: |
          docker-compose exec -T database pg_isready -U vitalsync_user

      - name: Health check - Backend API
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:3000/health; then
              echo "Backend is healthy"
              exit 0
            fi
            echo "Attempt $i/30 - waiting for backend..."
            sleep 2
          done
          echo "Backend health check failed"
          exit 1

      - name: Health check - Frontend
        run: |
          curl -f http://localhost/health || exit 1

      - name: Get deployment logs
        if: always()
        run: docker-compose logs

      - name: Cleanup on failure
        if: failure()
        run: docker-compose down

      - name: Send notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "VitalSync Staging Deployment ${{ job.status }}"
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
